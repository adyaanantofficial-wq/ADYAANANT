<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Get in touch with ADYAANANT. We are here to assist you with any inquiries. Contact us via email, Telegram, or our secure contact form.">
    <meta name="keywords" content="ADYAANANT contact, support, reach ADYAANANT, official ADYAANANT, contact form">
    <meta name="author" content="ADYAANANT">
    
    <meta property="og:title" content="Contact Us | ADYAANANT">
    <meta property="og:description" content="We are here to assist you. Feel free to reach out to ADYAANANT anytime.">
    <meta property="og:type" content="website">

    <title>Contact Us | ADYAANANT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #cccccc;
            margin-bottom: 40px;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .contact-info, .contact-form {
            background: #141414;
            padding: 30px;
            border-radius: 12px;
        }

        .contact-info h2, .contact-form h2 {
            margin-bottom: 20px;
        }

        .contact-info p {
            margin: 12px 0;
            font-size: 16px;
        }

        .contact-info a {
            color: #00c3ff;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .social-links a {
            display: block;
            margin: 10px 0;
        }

        /* Map Styles */
        .map-container {
            margin-top: 30px;
        }

        .map-container h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .map-container iframe {
            width: 100%;
            height: 250px;
            border: none;
            border-radius: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            box-sizing: border-box; 
            font-family: inherit;
            background: #2a2a2a;
            color: #fff;
        }
        
        input::placeholder, textarea::placeholder {
            color: #aaa;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            background: #00c3ff;
            color: #000;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: #00a2d6;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            color: #888;
        }

        @media(max-width: 768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<main class="container">

    <h1>Contact Us</h1>
    <p class="subtitle">We are here to assist you. Feel free to reach out to ADYAANANT anytime.</p>

    <div class="contact-wrapper">

        <section class="contact-info">
            <h2>Get in Touch</h2>
            <address style="font-style: normal;">
                <p><strong>Email:</strong><br>
                    <a href="mailto:adyaanant.official@gmail.com">adyaanant.official@gmail.com</a>
                </p>
                <p><strong>Telegram:</strong><br>
                    <a href="https://t.me/shaktiprataprudra" target="_blank" rel="noopener noreferrer">@shaktiprataprudra</a>
                </p>
            </address>

            <h2>Follow Us</h2>
            <div class="social-links">
                <a href="https://www.instagram.com/adyaanant/" target="_blank" rel="noopener noreferrer">Instagram — @adyaanant</a>
                <a href="https://www.facebook.com/profile.php?id=61588880750034" target="_blank" rel="noopener noreferrer">Facebook — ADYAANANT Official</a>
            </div>

            <div class="map-container">
                <h3>Our Location</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115713.82912443049!2d87.82025170386562!3d25.040176881729013!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39fa8a1e2f7c0001%3A0xcb065ec0f8a85117!2sManikchak%2C%20West%20Bengal!5e0!3m2!1sen!2sin!4v1713988000000!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <section class="contact-form">
            <h2>Send a Message</h2>
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                
                <input type="hidden" name="subject" value="New Contact from ADYAANANT Website">
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
                
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </section>

    </div>

    <footer class="footer-note">
        <p>© 2026 ADYAANANT. All rights reserved.</p>
    </footer>

</main>

</body>
</html>
